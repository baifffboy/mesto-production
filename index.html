<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mesto</title>
    <link rel="icon" href="data:," />
    <script type="module" crossorigin src="./assets/index-CzyJycVs.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-Pwcazcj0.css">
  </head>
  <body class="page">
    <div class="page__content">
      <header class="header page__section">
        <img
          alt="Логотип проекта Место"
          class="logo header__logo"
        />
      </header>

      <main class="content">
        <section class="profile page__section">
          <button
            type="button"
            class="profile__image"
            aria-label="Обновить аватар"
          ></button>
          <div class="profile__info">
            <h1 class="profile__title"></h1>
            <button
              type="button"
              class="profile__edit-button"
              aria-label="Редактировать профиль"
            ></button>
            <p class="profile__description"></p>
          </div>
          <button
            type="button"
            class="profile__add-button"
            aria-label="Добавить карточку"
          ></button>
        </section>

        <section class="places page__section">
          <ul class="places__list"></ul>
        </section>
      </main>

      <footer class="footer page__section">
        <p class="footer__copyright">© 2025 Mesto Russia</p>
      </footer>

      <div class="popup popup_type_edit">
        <div class="popup__content">
          <button type="button" class="popup__close" aria-label="Закрыть"></button>
          <h3 class="popup__title">Редактировать профиль</h3>
          <form class="popup__form" name="edit-profile" novalidate>
            <label class="popup__label">
              <input
                type="text"
                name="name"
                id="profile-name-input"
                class="popup__input popup__input_type_name"
                placeholder="Имя"
                minlength="2"
                maxlength="40"
                pattern="^[A-Za-zА-Яа-яЁё\s\-]+$"
                data-error-message="Только буквы (RU/EN), дефис и пробел"
                required
              />
              <span class="popup__error profile-name-input-error"></span>
            </label>
            <label class="popup__label">
              <input
                type="text"
                name="description"
                id="profile-description-input"
                class="popup__input popup__input_type_description"
                placeholder="О себе"
                minlength="2"
                maxlength="200"
                required
              />
              <span class="popup__error profile-description-input-error"></span>
            </label>
            <button
              type="submit"
              class="popup__button popup__button_disabled"
              disabled
            >Сохранить</button>
          </form>
        </div>
      </div>

      <div class="popup popup_type_new-card">
        <div class="popup__content">
          <button type="button" class="popup__close" aria-label="Закрыть"></button>
          <h3 class="popup__title">Новое место</h3>
          <form class="popup__form" name="new-place" novalidate>
            <label class="popup__label">
              <input
                type="text"
                name="place-name"
                id="card-name-input"
                class="popup__input popup__input_type_card-name"
                placeholder="Название"
                minlength="2"
                maxlength="30"
                pattern="^[A-Za-zА-Яа-яЁё\s\-]+$"
                data-error-message="Только буквы (RU/EN), дефис и пробел"
                required
              />
              <span class="popup__error card-name-input-error"></span>
            </label>
            <label class="popup__label">
              <input
                type="url"
                name="link"
                id="card-link-input"
                class="popup__input popup__input_type_url"
                placeholder="Ссылка на картинку"
                required
              />
              <span class="popup__error card-link-input-error"></span>
            </label>
            <button
              type="submit"
              class="popup__button popup__button_disabled"
              disabled
            >Создать</button>
          </form>
        </div>
      </div>

      <div class="popup popup_type_edit-avatar">
        <div class="popup__content">
          <button type="button" class="popup__close" aria-label="Закрыть"></button>
          <h3 class="popup__title">Обновить аватар</h3>
          <form class="popup__form" name="edit-avatar" novalidate>
            <label class="popup__label">
              <input
                type="url"
                name="avatar"
                id="avatar-input"
                class="popup__input popup__input_type_avatar"
                placeholder="Ссылка на аватар"
                required
              />
              <span class="popup__error avatar-input-error"></span>
            </label>
            <button
              type="submit"
              class="popup__button popup__button_disabled"
              disabled
            >Сохранить</button>
          </form>
        </div>
      </div>

      <div class="popup popup_type_image">
        <div class="popup__content popup__content_content_image">
          <button type="button" class="popup__close" aria-label="Закрыть"></button>
          <img src="" alt="" class="popup__image" />
          <p class="popup__caption"></p>
        </div>
      </div>

      <div class="popup popup_type_remove-card">
        <div class="popup__content">
          <button type="button" class="popup__close" aria-label="Закрыть"></button>
          <h3 class="popup__title">Вы уверены?</h3>
          <form class="popup__form" name="remove-card">
            <button type="submit" class="popup__button">Да</button>
          </form>
        </div>
      </div>

      <div class="popup popup_type_info">
        <div class="popup__content popup__content_content_info">
          <button type="button" class="popup__close" aria-label="Закрыть"></button>
          <h3 class="popup__title">Статистика карточки</h3>
          <dl class="popup-info__list"></dl>
          <p class="popup-info__subtitle">Карточку лайкнули:</p>
          <ul class="popup-info__users"></ul>
        </div>
      </div>
    </div>

    <template id="card-template">
      <li class="places__item card">
        <img class="card__image" src="" alt="" />
        <button
          type="button"
          class="card__control-button card__control-button_type_info"
          aria-label="Информация о карточке"
        ></button>
        <button
          type="button"
          class="card__delete-button"
          aria-label="Удалить карточку"
        ></button>
        <div class="card__description">
          <h2 class="card__title"></h2>
          <div class="card__like-group">
            <button
              type="button"
              class="card__like-button"
              aria-label="Поставить лайк"
            ></button>
            <span class="card__like-count">0</span>
          </div>
        </div>
      </li>
    </template>

    <template id="popup-info-definition-template">
      <div class="popup-info__definition">
        <dt class="popup-info__term"></dt>
        <dd class="popup-info__description"></dd>
      </div>
    </template>

    <template id="popup-info-user-preview-template">
      <li class="popup-info__user">
        <img class="popup-info__user-avatar" src="" alt="" />
        <p class="popup-info__user-name"></p>
      </li>
    </template>

  </body>
</html>
